<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ice:#87CEEB;--blue:#1E6B9E;--navy:#1B4F72;--navy-deep:#0F3352;
  --off:#F4F8FB;--light:#EBF4FA;--mist:#C8E0EF;--gray:#7A9EB5;
  --dark:#0D2B43;--red:#E85D26;--orange:#D4720A;
  --f:'DM Sans',sans-serif;
}
html{scroll-behavior:smooth}
body{background:#fff;color:var(--dark);font-family:var(--f);font-weight:300;overflow-x:hidden}

/* NAV */
nav{position:fixed;inset:0 0 auto;z-index:999;display:flex;align-items:center;justify-content:space-between;padding:12px 52px;background:rgba(255,255,255,.95);backdrop-filter:blur(14px);border-bottom:1px solid rgba(30,107,158,.05)}
.nl img{height:28px;display:block}
.nr{display:flex;gap:0;list-style:none;align-items:center}
.nr>li>a{display:block;font-size:10px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--navy);text-decoration:none;opacity:.5;transition:.2s;padding:9px 18px}
.nr>li>a:hover,.nr>li>a.act{opacity:1;color:var(--blue)}

/* HEADER */
.header{padding:120px 52px 100px;background:#fff;text-align:center;position:relative}
.header h1{font-size:clamp(36px,6vw,64px);font-weight:300;color:var(--navy-deep);letter-spacing:-.01em;margin-bottom:8px}
.header h1 span{font-weight:800;color:var(--blue)}
.header p{font-size:13px;color:var(--gray);max-width:400px;margin:0 auto;position:relative;font-weight:300}

/* GALLERY */
.gallery-section{max-width:1200px;margin:0 auto;padding:0 52px 100px}
.gallery-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:24px}

/* PRODUCT CARD */
.product-card{background:#fff;border:1px solid rgba(30,107,158,.08);border-radius:4px;overflow:hidden;cursor:pointer;transition:all .25s ease;display:flex;flex-direction:column}
.product-card:hover{border-color:var(--blue);box-shadow:0 4px 16px rgba(30,107,158,.08);transform:translateY(-2px)}

.card-image{width:100%;aspect-ratio:1;display:flex;align-items:center;justify-content:center;overflow:hidden;background:#fafafa}
.card-image img{width:100%;height:100%;object-fit:contain;padding:20px;transition:transform .25s}
.product-card:hover .card-image img{transform:scale(1.04)}

.card-info{padding:14px;border-top:1px solid rgba(30,107,158,.08);text-align:center}
.card-model{font-size:8px;letter-spacing:.15em;text-transform:uppercase;color:var(--blue);margin-bottom:3px;font-weight:600}
.card-name{font-size:11px;font-weight:600;color:var(--navy-deep);line-height:1.3;margin-bottom:4px}
.card-price{font-size:13px;font-weight:700;color:green}

/* DETAIL MODAL */
.detail-modal{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:1000;opacity:0;visibility:hidden;transition:all .25s;padding:20px;display:flex;align-items:center;justify-content:center;overflow-y:auto}
.detail-modal.open{opacity:1;visibility:visible}

.detail-content{background:#fff;border-radius:8px;max-width:900px;width:100%;max-height:90vh;overflow-y:auto;animation:slideUp .3s cubic-bezier(.4,0,.2,1)}
@keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}

.detail-close{position:absolute;top:20px;right:20px;font-size:28px;cursor:pointer;color:var(--gray);transition:.2s;z-index:10;background:#fff;width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:50%;border:1px solid rgba(30,107,158,.1)}
.detail-close:hover{color:var(--navy);background:var(--light)}

.detail-body{padding:48px;position:relative}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:start}

.detail-image-wrap{position:sticky;top:80px}
.detail-image{width:100%;aspect-ratio:1;background:#fafafa;border:1px solid rgba(30,107,158,.08);border-radius:4px;display:flex;align-items:center;justify-content:center;overflow:hidden}
.detail-image img{width:100%;height:100%;object-fit:contain;padding:40px}

.detail-info h2{font-size:24px;font-weight:300;color:var(--navy-deep);margin-bottom:2px}
.detail-info h2 strong{font-weight:800}
.detail-meta{display:flex;gap:16px;align-items:baseline;margin-bottom:32px}
.detail-price{font-size:20px;font-weight:700;color:var(--red)}
.detail-shipping{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--gray);font-weight:500}
.detail-desc{font-size:13px;line-height:1.8;color:var(--gray);margin-bottom:40px;font-weight:300}

/* OPTIONS */
.option-group{margin-bottom:36px}
.option-label{font-size:8px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--navy);margin-bottom:14px;display:block;opacity:.6}

.color-options{display:flex;gap:10px}
.color-btn{width:40px;height:40px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:all .2s;box-shadow:none}
.color-btn:hover{border-color:var(--blue);transform:scale(1.08)}
.color-btn.active{border-color:var(--blue);box-shadow:0 0 0 2px rgba(30,107,158,.15)}

.size-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.size-btn{padding:10px;border:1px solid rgba(30,107,158,.1);background:#fff;color:var(--navy);font-weight:600;font-size:10px;cursor:pointer;transition:all .2s;border-radius:3px}
.size-btn:hover{border-color:var(--blue);background:var(--light)}
.size-btn.active{background:var(--blue);color:#fff;border-color:var(--blue)}

.buy-btn{width:100%;padding:14px;background:var(--red);color:#fff;border:none;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;border-radius:3px;cursor:pointer;transition:all .2s}
.buy-btn:hover{background:var(--orange);transform:translateY(-1px)}

/* RESPONSIVE */
@media(max-width:1024px){
  .detail-grid{grid-template-columns:1fr;gap:40px}
  .detail-image-wrap{position:static}
  .gallery-section{padding:0 32px 80px}
}

@media(max-width:768px){
  .header{padding:80px 24px 60px}
  nav{padding:12px 20px}
  .gallery-grid{grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:16px}
  .gallery-section{padding:0 20px 60px}
  .detail-body{padding:24px}
}

@media(max-width:480px){
  nav{padding:12px 16px}
  .nl img{height:20px}
  .nr>li>a{padding:6px 10px;font-size:9px}
  .header{padding:60px 16px 40px}
  .gallery-grid{grid-template-columns:repeat(2,1fr);gap:12px}
  .gallery-section{padding:0 16px 40px}
  .size-grid{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nl"><img src="data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMTAwIiBoZWlnaHQ9IjUwIiB2aWV3Qm94PSIwIDAgMTAwIDUwIiBmaWxsPSJub25lIiB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciPjx0ZXh0IHg9IjUwIiB5PSIzMyIgdGV4dC1hbmNob3I9Im1pZGRsZSIgZm9udC1mYW1pbHk9IkRNIFNhbnMiIGZvbnQtc2l6ZT0iMjQiIGZvbnQtd2VpZ2h0PSI4MDAiIGZpbGw9IiMxQjRGNzIiPlZJVEFMSUNFPC90ZXh0Pjwvc3ZnPg==" alt="Vitalice"></a>
  <ul class="nr">
    <li><a href="index.html">Home</a></li>
    <li><a href="coldplunge.html">Cold Plunge</a></li>

  </ul>
</nav>

<header class="header">
  <h1><span>Merch</span> Vitalice</h1>
  <p>100% Peruvian Pima Cotton</p>
</header>

<section class="gallery-section">
  <div class="gallery-grid" id="gallery">
    <!-- Products generated by JavaScript -->
  </div>
</section>

<!-- DETAIL MODAL -->
<div class="detail-modal" id="detailModal">
  <div class="detail-content">
    <span class="detail-close" onclick="closeDetail()">&times;</span>
    <div class="detail-body">
      <div class="detail-grid">
        <div class="detail-image-wrap">
          <div class="detail-image">
            <img id="detailImage" src="" alt="">
          </div>
        </div>
        <div class="detail-info">
          <h2 id="detailModel"><strong id="detailName"></strong></h2>
          <div class="detail-meta">
            <span class="detail-price">$30</span>
            <span class="detail-shipping">Envío gratis</span>
          </div>
          <p class="detail-desc" id="detailDesc"></p>

          <div class="option-group">
            <label class="option-label">Color</label>
            <div class="color-options" id="detailColors"></div>
          </div>

          <div class="option-group">
            <label class="option-label">Talla</label>
            <div class="size-grid" id="detailSizes"></div>
          </div>

          <button class="buy-btn" onclick="buyProduct()">Comprar</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const products = [
  {id: 1, model: 'Vitalice Classic Fit', name: 'T-Shirt', colors: ['navy', 'grey'], images: {navy: 'tshirt_navy.png', grey: 'tshirt_grey.png'}, desc: 'Camiseta premium 100% Pima Cotton. Minimalista y versátil.'},
  {id: 2, model: 'Iceberg Classic Fit', name: 'T-Shirt', colors: ['navy', 'grey'], images: {navy: 'iceberg_navy.png', grey: 'iceberg_grey.png'}, desc: 'Camiseta con iceberg logo. Diseño icónico.'}
];

let selectedProduct = null;
let selectedColor = 'navy';
let selectedSize = '';

function initGallery() {
  const gallery = document.getElementById('gallery');
  let html = '';

  products.forEach(product => {
    html += `
      <div class="product-card" onclick="openDetail(${product.id})">
        <div class="card-image">
          <img src="${product.images.navy}" alt="${product.model} ${product.name}">
        </div>
        <div class="card-info">
          <div class="card-model">${product.model}</div>
          <div class="card-name">${product.name}</div>
          <div class="card-price">$30</div>
        </div>
      </div>
    `;
  });

  gallery.innerHTML = html;
}

function openDetail(productId) {
  selectedProduct = products.find(p => p.id === productId);
  selectedColor = 'navy';
  selectedSize = '';

  document.getElementById('detailModel').textContent = selectedProduct.model + ' ';
  document.getElementById('detailName').textContent = selectedProduct.name;
  document.getElementById('detailImage').src = selectedProduct.images.navy;
  document.getElementById('detailDesc').textContent = selectedProduct.desc;

  let colorsHtml = '';
  selectedProduct.colors.forEach(color => {
    const colorClass = color === 'navy' ? 'card-color-navy' : 'card-color-grey';
    const colorName = color === 'navy' ? 'Navy Blue' : 'Cold Grey';
    colorsHtml += `<button class="color-btn ${colorClass} ${color === 'navy' ? 'active' : ''}" onclick="changeDetailColor('${color}', this)" title="${colorName}"></button>`;
  });
  document.getElementById('detailColors').innerHTML = colorsHtml;

  let sizesHtml = '';
  ['S', 'M', 'L', 'XL'].forEach(size => {
    sizesHtml += `<button class="size-btn" onclick="selectDetailSize('${size}', this)">${size}</button>`;
  });
  document.getElementById('detailSizes').innerHTML = sizesHtml;

  document.getElementById('detailModal').classList.add('open');
}

function closeDetail() {
  document.getElementById('detailModal').classList.remove('open');
  selectedSize = '';
}

function changeDetailColor(color, btn) {
  selectedColor = color;
  document.getElementById('detailImage').src = selectedProduct.images[color];
  document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function selectDetailSize(size, btn) {
  selectedSize = size;
  document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function buyProduct() {
  if (!selectedSize) {
    alert('Por favor selecciona una talla');
    return;
  }

  const colorName = selectedColor === 'navy' ? 'Navy Blue' : 'Cold Grey';
  const message = `Hola, me gustaría comprar:\n\n👕 ${selectedProduct.model} ${selectedProduct.name}\nColor: ${colorName}\nTalla: ${selectedSize}\nPrecio: $30 USD\nEnvío: Gratis`;

  const encoded = encodeURIComponent(message);
  window.location.href = `https://wa.me/584123136090?text=${encoded}`;
}

// Init
initGallery();

// Close modal on outside click
document.getElementById('detailModal').addEventListener('click', (e) => {
  if (e.target === document.getElementById('detailModal')) closeDetail();
});
</script>

</body>
